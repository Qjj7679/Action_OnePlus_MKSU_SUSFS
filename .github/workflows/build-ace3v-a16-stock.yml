name: Build Ace 3V A16 Stock Kernel

on:
workflow_dispatch:

env:
CPU: "sm7675"
FEIL: "oneplus_ace_3v_b"
CPUD: "pineapple"
ANDROID_VERSION: "android16"
KERNEL_VERSION: "6.1"
BUILD_METHOD: "gki"

jobs:
build:
runs-on: ubuntu-latest
timeout-minutes: 360

steps:
- name: Maximize build space
uses: easimon/maximize-build-space@master
with:
root-reserve-mb: 8192
temp-reserve-mb: 2048
swap-size-mb: 8192
remove-dotnet: "true"
remove-android: "true"
remove-haskell: "true"
remove-codeql: "true"

- name: Configure Git
run: |
git config --global user.name "Qjj7679"
git config --global user.email "actions@github.com"

- name: Install dependencies
run: |
sudo apt update
sudo apt install -y python3 git curl jq

- name: Install repo tool
run: |
curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/repo
chmod +x ~/repo
sudo mv ~/repo /usr/local/bin/repo
repo version

- name: Show build config
run: |
echo "CPU=${CPU}"
echo "FEIL=${FEIL}"
echo "CPUD=${CPUD}"
echo "ANDROID_VERSION=${ANDROID_VERSION}"
echo "KERNEL_VERSION=${KERNEL_VERSION}"
echo "BUILD_METHOD=${BUILD_METHOD}"

- name: Initialize repo
run: |
mkdir -p kernel_workspace
cd kernel_workspace
repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/${CPU} -m ${FEIL}.xml --depth=1

- name: Sync sources
run: |
cd kernel_workspace
repo sync -c -j8 --no-tags 2>&1 | tee repo-sync.log

- name: Check synced tree
run: |
cd kernel_workspace
echo "===== workspace ====="
ls -lah
echo "===== kernel_platform ====="
ls -lah kernel_platform || true
echo "===== kernel_platform/common ====="
ls -lah kernel_platform/common || true
echo "===== kernel_platform/msm-kernel ====="
ls -lah kernel_platform/msm-kernel || true
echo "===== build_with_bazel.py ====="
ls -lah kernel_platform/build_with_bazel.py || true

- name: Relax protected exports checks
run: |
cd kernel_workspace
if [ -e kernel_platform/common/BUILD.bazel ]; then
sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/common/BUILD.bazel
fi
if [ -e kernel_platform/msm-kernel/BUILD.bazel ]; then
sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/msm-kernel/BUILD.bazel
fi
rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true

- name: Remove dirty suffix
run: |
cd kernel_workspace/kernel_platform
sed -i 's/ -dirty//g' common/scripts/setlocalversion || true
sed -i 's/ -dirty//g' msm-kernel/scripts/setlocalversion || true
sed -i 's/ -dirty//g' external/dtc/scripts/setlocalversion || true
sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' common/scripts/setlocalversion || true

- name: Build kernel
run: |
cd kernel_workspace
chmod +x ./kernel_platform/build_with_bazel.py || true
./kernel_platform/build_with_bazel.py -t ${CPUD} ${BUILD_METHOD} 2>&1 | tee build.log

- name: Collect outputs
run: |
mkdir -p out-artifacts

DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${CPUD}-${BUILD_METHOD}/dist"
BAZEL_DIR="kernel_workspace/kernel_platform/bazel-out/k8-fastbuild/bin/msm-kernel/${CPUD}_gki_kbuild_mixed_tree"

echo "===== DIST_DIR ====="
ls -lah "${DIST_DIR}" || true
echo "===== BAZEL_DIR ====="
ls -lah "${BAZEL_DIR}" || true

IMAGE_PATH=""
if [ -f "${DIST_DIR}/Image" ]; then
IMAGE_PATH="${DIST_DIR}/Image"
elif [ -f "${BAZEL_DIR}/Image" ]; then
IMAGE_PATH="${BAZEL_DIR}/Image"
else
IMAGE_PATH=$(find kernel_workspace -type f -name Image | head -n 1)
fi

if [ -n "${IMAGE_PATH}" ] && [ -f "${IMAGE_PATH}" ]; then
cp "${IMAGE_PATH}" out-artifacts/Image
echo "Found Image at: ${IMAGE_PATH}"
else
echo "Image not found"
fi

find kernel_workspace -type f | grep -E '(/Image|/Image\\.gz|/Image\\.lz4|\\.dtb$|\\.dtbo$|/dtbo\\.img$|/boot\\.img$|/vendor_boot\\.img$|/vendor_dlkm\\.img$)' | sort > out-artifacts/found-files.txt || true

cp kernel_workspace/build.log out-artifacts/build.log || true
cp kernel_workspace/repo-sync.log out-artifacts/repo-sync.log || true

- name: Upload artifacts
uses: actions/upload-artifact@v4
with:
name: Ace3V_A16_Stock_Kernel
path: out-artifacts/
